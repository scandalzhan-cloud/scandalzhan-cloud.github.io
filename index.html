    const searchInput = document.getElementById("searchInput");
    const resultList = document.getElementById("resultList");
    const infoText = document.getElementById("infoText");

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlight(text, keyword) {
      if (!keyword) return text;
      const regex = new RegExp(escapeRegExp(keyword), "gi");
      return text.replace(regex, match => `<span class="highlight">${match}</span>`);
    }

    function render(keyword = "") {
      const k = keyword.trim();

      const filtered = data.filter(item => {
        if (!k) return true;
        return (
          String(item.id).includes(k) ||
          item.q.includes(k) ||
          item.a.includes(k)
        );
      });

      infoText.textContent = `共 ${data.length} 題｜目前顯示 ${filtered.length} 題`;

      if (filtered.length === 0) {
        resultList.innerHTML = `<div class="empty">查無結果</div>`;
        return;
      }

      resultList.innerHTML = filtered.map(item => `
        <div class="item">
          <div class="qid">題號：${highlight(String(item.id), k)}</div>
          <div class="q">${highlight(item.q, k)}</div>
          <div class="a">答案：${highlight(item.a, k)}</div>
        </div>
      `).join("");
    }

    searchInput.addEventListener("input", function () {
      render(this.value);
    });

    render();
  </script>
